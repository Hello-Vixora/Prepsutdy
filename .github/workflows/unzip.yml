name: Extract project zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and clean up
        run: |
          shopt -s nullglob
          for f in *.zip; do
            echo "Extracting $f"
            unzip -o "$f" -d _extracted
            rm -f "$f"
          done
          if [ -d _extracted ]; then
            shopt -u nullglob
            top_dirs=(_extracted/*/)
            if [ "${#top_dirs[@]}" -eq 1 ]; then
              cp -r "${top_dirs[0]}." .
            else
              cp -r _extracted/. .
            fi
            rm -rf _extracted
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract Android project from zip" || echo "Nothing to commit"
          git push
