workflows:
  android-debug:
    name: ReplyVault Debug Build
    max_build_duration: 60
    instance_type: linux
    scripts:
      - name: Regenerate Gradle wrapper jar
        script: |
          gradle wrapper --gradle-version 8.7
      - name: Build debug APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
